<!DOCTYPE html>\n<html lang=\"es\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title data-i18n=\"timezoneClock\">Reloj de Zonas Horarias</title>\n  <link rel=\"stylesheet\" href=\"style.css\">\n  <link rel=\"stylesheet\" href=\"timezone-clock.css\">\n</head>\n<body>\n  <!-- HEADER CON SELECTOR DE IDIOMA -->\n  <header class=\"hero\">\n    <div class=\"hero-logo\">\n      <span class=\"logo-icon\">🕐</span>\n      <span class=\"logo-text\" data-i18n=\"timezoneClock\">Reloj de Zonas Horarias</span>\n    </div>\n\n    <p class=\"hero-slogan\" data-i18n=\"timezoneSlogan\">Hora en tiempo real alrededor del mundo</p>\n\n    <div class=\"lang-selector\">\n      <label for=\"language\" data-i18n=\"selectLanguage\">Idioma:</label>\n      <select id=\"language\">\n        <option value=\"es\">🇪🇸 Español</option>\n        <option value=\"en\">🇬🇧 English</option>\n        <option value=\"fr\">🇫🇷 Français</option>\n      </select>\n    </div>\n  </header>\n\n  <!-- CONTENEDOR PRINCIPAL -->\n  <main class=\"timezone-container\">\n    <!-- CONTROLES -->\n    <div class=\"timezone-controls\">\n      <div class=\"control-group\">\n        <input \n          type=\"text\" \n          id=\"timezone-search\" \n          class=\"timezone-search\" \n          placeholder=\"Buscar zona horaria...\"\n          data-i18n-placeholder=\"searchTimezone\"\n        >\n        <select id=\"timezone-add\" class=\"timezone-select\">\n          <option value=\"\" data-i18n=\"selectToAdd\">Seleccionar para agregar...</option>\n        </select>\n        <button id=\"add-timezone-btn\" class=\"btn btn-primary\" data-i18n=\"addZone\">Agregar</button>\n      </div>\n\n      <div class=\"control-group\">\n        <button id=\"reset-btn\" class=\"btn btn-secondary\" data-i18n=\"reset\">Restablecer</button>\n        <label class=\"checkbox-label\">\n          <input type=\"checkbox\" id=\"24h-format\" checked>\n          <span data-i18n=\"format24h\">Formato 24h</span>\n        </label>\n      </div>\n    </div>\n\n    <!-- GRID DE RELOJES -->\n    <div id=\"clocks-grid\" class=\"clocks-grid\">\n      <!-- Los relojes se generan dinámicamente aquí -->\n    </div>\n  </main>\n\n  <!-- FOOTER -->\n  <footer class=\"footer\">\n    <p data-i18n=\"footerText\">© 2024 GlobeNow. Todos los derechos reservados.</p>\n    <button id=\"dark-mode-toggle\" class=\"dark-mode-btn\" title=\"Toggle Dark Mode\">🌙</button>\n  </footer>\n\n  <script src=\"i18n.js\"></script>\n  <script src=\"timezone-clock.js\"></script>\n</body>\n</html>"
